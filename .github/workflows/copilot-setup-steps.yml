name: Copilot setup steps

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Mix
        if: ${{ hashFiles('mix.exs') != '' && hashFiles('.tool-versions') != '' }}
        uses: ex-actions/setup-mix@v1
        with:
          version-file: .tool-versions

      - name: Install Elixir dependencies
        if: ${{ hashFiles('mix.exs') != '' && hashFiles('.tool-versions') != '' }}
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
