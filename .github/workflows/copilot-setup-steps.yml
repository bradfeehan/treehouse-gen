name: Copilot setup steps

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Elixir and Erlang
        if: ${{ hashFiles('mix.exs') != '' }}
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.17'
          otp-version: '27'

      - name: Install Elixir dependencies
        if: ${{ hashFiles('mix.exs') != '' }}
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
